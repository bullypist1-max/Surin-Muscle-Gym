<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>Surin's Muscle Gym</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#111;color:#f5f5f5;font-family:'Noto Sans Thai','Kanit',sans-serif;min-height:100vh}
input,button{font-family:inherit}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) sepia(1) saturate(5) hue-rotate(10deg);opacity:.8}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#1a1a1a}::-webkit-scrollbar-thumb{background:#f5c518;border-radius:2px}
.wrap{max-width:480px;margin:0 auto;padding:16px 14px 90px}
input{background:#1a1a1a;border:1.5px solid #2a2a2a;border-radius:10px;color:#f5f5f5;padding:11px 14px;font-size:16px;width:100%;outline:none;transition:border .15s}
input:focus{border-color:#f5c518}
.btn-p{background:#f5c518;color:#111;border:none;border-radius:12px;padding:12px 20px;font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px #f5c51840}
.btn-p:active{background:#e0b010}
.btn-g{background:#1a1a1a;color:#f5c518;border:1.5px solid #2a2a2a;border-radius:12px;padding:11px 18px;font-weight:600;font-size:14px;cursor:pointer}
.btn-g:active{background:#222}
.btn-d{background:#1a1a1a;color:#ff6060;border:1.5px solid #3a2020;border-radius:12px;padding:11px 18px;font-weight:600;font-size:14px;cursor:pointer;width:100%}
.card{background:#1a1a1a;border:1.5px solid #252525;border-radius:16px;padding:14px 16px;cursor:pointer;margin-bottom:10px;transition:all .15s}
.card:active{border-color:#f5c518;box-shadow:0 0 12px #f5c51820}
.panel{background:#1a1a1a;border:1.5px solid #252525;border-radius:18px;padding:20px;margin-bottom:14px}
.stat-row{display:flex;gap:10px;margin-bottom:16px}
.stat{flex:1;background:#111;border-radius:12px;padding:12px 8px;text-align:center;border:1px solid #252525}
.stat-num{font-family:Kanit;font-size:24px;font-weight:900;line-height:1}
.stat-label{color:#666;font-size:11px;margin-top:2px}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#111;border-radius:10px;margin-bottom:8px}
.hist-del{background:none;border:none;color:#ff6060;cursor:pointer;font-size:16px;padding:0 4px}
.hist-list{max-height:280px;overflow-y:auto}
.field{margin-bottom:14px}
.field-label{font-size:13px;color:#888;margin-bottom:6px}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 24px;border-radius:40px;font-weight:700;font-size:14px;box-shadow:0 4px 24px #0006;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.flex-row{display:flex;gap:10px}
.empty{text-align:center;color:#555;margin-top:40px;font-size:14px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #222;display:flex;z-index:100}
.nav-btn{flex:1;padding:12px 0;background:none;border:none;color:#555;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;transition:color .15s}
.nav-btn.active{color:#f5c518}
.nav-icon{font-size:20px}
.last-date{color:#666;font-size:11px;margin-top:3px}
.dash-card{background:#1a1a1a;border:1.5px solid #252525;border-radius:16px;padding:16px;margin-bottom:12px}
.dash-num{font-family:Kanit;font-size:36px;font-weight:900;color:#f5c518;line-height:1}
.dash-label{color:#666;font-size:13px;margin-top:4px}
.warn-item{background:#1f1a00;border:1.5px solid #3a3000;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.logo-header{width:100%;max-width:280px;margin:0 auto 12px;display:block;border-radius:8px}
.header-box{text-align:center;margin-bottom:16px}
</style>
</head>
<body>
<div id="page-home" class="wrap"><div style="text-align:center;color:#555;margin-top:60px">⏳ กำลังโหลด...</div></div>
<div id="page-dash" class="wrap" style="display:none"></div>
<div class="bottom-nav">

</div>

var members = [];
var view = 'list';
var selected = null;
var searchVal = '';
var checkinDate = getTodayStr();
var editTotal = 0, editUsed = 0;
var currentTab = 'home';
var warnLimit = parseInt(localStorage.getItem('warnLimit')||'3');

function getTodayStr() { return new Date().toISOString().split('T')[0]; }
function formatDateTH(d) {
  if(!d) return '';
  var p=d.split('-');
  if(p.length!==3) return d;
  return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
}
function isValidDate(d){if(!d)return false;var y=parseInt(d.split('-')[0]);return y>=2020&&y<=2035;}
function getLastDate(m){var v=m.history.filter(isValidDate);return v.length>0?v[v.length-1]:null;}

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'#ff4444':'#f5c518';
  t.style.color=type==='error'?'#fff':'#111';
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('page-home').style.display=tab==='home'?'block':'none';
  document.getElementById('page-dash').style.display=tab==='dash'?'block':'none';
  document.getElementById('nav-home').className='nav-btn'+(tab==='home'?' active':'');
  document.getElementById('nav-dash').className='nav-btn'+(tab==='dash'?' active':'');
  if(tab==='dash') renderDashboard();
}

function updateSyncStatus(s){
  var el=document.getElementById('sync-status');
  if(!el) return;
  if(s==='ok'){el.textContent='🟢 ซิงค์แล้ว';el.style.color='#f5c518';}
  else if(s==='loading'){el.textContent='🟡 กำลังซิงค์...';el.style.color='#f0a500';}
  else{el.textContent='🔴 offline';el.style.color='#ff6060';}
}

window._search=function(val){searchVal=val;filterList();};

function filterList(){
  var q=searchVal.toLowerCase();
  var filtered=members.filter(function(m){return m.name.toLowerCase().indexOf(q)!==-1;});
  var el=document.getElementById('list-items');
  var ct=document.getElementById('list-count');
  if(!el) return;
  if(ct) ct.textContent='แสดง '+filtered.length+' คน';
  if(!filtered.length){el.innerHTML='<div class="empty">ไม่พบสมาชิก</div>';return;}
  el.innerHTML=filtered.map(function(m){
    var rem=m.totalSessions-m.usedSessions;
    var pct=m.totalSessions>0?Math.min(100,m.usedSessions/m.totalSessions*100):0;
    var low=rem<=warnLimit;
    var lastDate=getLastDate(m);
    return '<div class="card" onclick="goDetail('+m.id+')">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
      '<div style="flex:1;min-width:0">' +
      '<div style="font-family:Kanit;font-weight:700;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+m.name+'</div>' +
      '<div style="color:#666;font-size:12px;margin-top:2px">มาแล้ว '+m.usedSessions+' ครั้ง</div>' +
      (lastDate?'<div class="last-date">📅 ล่าสุด: '+formatDateTH(lastDate)+'</div>':'<div class="last-date" style="color:#444">ยังไม่เคยเช็คอิน</div>') +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-left:10px;flex-shrink:0">' +
      '<div style="text-align:right">' +
      '<div style="font-family:Kanit;font-size:22px;font-weight:900;color:'+(low?'#ff6060':'#f5c518')+';line-height:1">'+rem+'</div>' +
      '<div style="color:#555;font-size:10px">คงเหลือ</div></div>' +
      '<button class="btn-p" style="padding:7px 14px;font-size:13px;border-radius:10px" onclick="event.stopPropagation();goCheckin('+m.id+')">✓</button>' +
      '</div></div>' +
      '<div style="margin-top:10px;background:#222;border-radius:99px;height:4px;overflow:hidden">' +
      '<div style="height:100%;width:'+pct+'%;background:'+(low?'#ff6060':'#f5c518')+';border-radius:99px"></div></div></div>';
  }).join('');
}

function goDetail(id){selected=members.find(function(m){return m.id===id;});view='detail';render();}
function goCheckin(id){selected=members.find(function(m){return m.id===id;});checkinDate=getTodayStr();view='checkin';render();}
function goEdit(id){selected=members.find(function(m){return m.id===id;});editTotal=selected.totalSessions;editUsed=selected.usedSessions;view='editSessions';render();}
function setView(v){view=v;render();}
function getSelected(){return members.find(function(m){return m.id===selected.id;})||selected;}
function updateRemain(){
  var t=parseInt(document.getElementById('edit-total').value)||0;
  var u=parseInt(document.getElementById('edit-used').value)||0;
  var el=document.getElementById('remain-val');
  if(el) el.textContent=Math.max(0,t-u)+' ครั้ง';
}

function logoHTML(){ return ''; }

function render(){
  var app=document.getElementById('page-home');
  if(!app) return;
  var m,rem,histHtml,filtered,lastDate;
  if(view==='list'){
    filtered=members.filter(function(m){return m.name.toLowerCase().indexOf(searchVal.toLowerCase())!==-1;});
    var warnCount=members.filter(function(m){return (m.totalSessions-m.usedSessions)<=warnLimit&&m.usedSessions>0;}).length;
    app.innerHTML=
      logoHTML()+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
      '<div><div style="color:#666;font-size:11px">สมาชิกทั้งหมด '+members.length+' คน</div></div>' +
      '<div style="display:flex;align-items:center;gap:8px">' +
      '<span id="sync-status" style="font-size:11px;color:#f5c518">🟢 ซิงค์แล้ว</span>' +
      '<button class="btn-g" style="padding:4px 10px;font-size:11px" onclick="window._load()">🔄</button>' +
      '</div></div>' +
      (warnCount>0?'<div style="background:#1f1a00;border:1.5px solid #3a3000;border-radius:12px;padding:10px 14px;margin-bottom:12px;cursor:pointer;font-size:13px;color:#f5c518" onclick="switchTab('dash')">⚠️ มีสมาชิก <b>'+warnCount+' คน</b> ใกล้หมดครั้ง → ดู Dashboard</div>':'') +
      '<div style="display:flex;gap:8px;margin-bottom:8px">' +
      '<input id="search-input" placeholder="🔍 ค้นหาสมาชิก..." value="'+searchVal.replace(/"/g,'&quot;')+'" oninput="window._search(this.value)" />' +

      '</div>' +
      '<div id="list-count" style="color:#555;font-size:12px;margin-bottom:12px">แสดง '+filtered.length+' คน</div>' +
      '<div id="list-items"></div>';
    filterList();
  } else if(view==='checkin'){
    m=getSelected();rem=m.totalSessions-m.usedSessions;lastDate=getLastDate(m);

      '<div style="font-size:12px;color:#666;margin-bottom:4px">เช็คอินสำหรับ</div>' +

      '<div class="field"><div class="field-label">วันที่เช็คอิน (เลือกย้อนหลังได้)</div>' +
      '<input type="date" id="checkin-date" value="'+checkinDate+'" max="'+getTodayStr()+'" /></div>' +
      '<div class="stat-row" style="margin-bottom:18px">' +
      '<div class="stat"><div class="stat-num" style="color:#f5c518">'+m.usedSessions+'</div><div class="stat-label">มาแล้ว</div></div>' +
      '<div class="stat"><div class="stat-num" style="color:'+(rem<=warnLimit?'#ff6060':'#f5f5f5')+'">'+rem+'</div><div class="stat-label">คงเหลือ</div></div>' +

      '<button class="btn-p" style="flex:2" onclick="doCheckin()">✓ ยืนยันเช็คอิน</button>' +
      '</div></div>';
  } else if(view==='detail'){
    m=getSelected();rem=m.totalSessions-m.usedSessions;lastDate=getLastDate(m);
    histHtml=m.history.slice().reverse().map(function(date,i){
      return '<div class="hist-item"><div>'+

  } else if(view==='addMember'){
    app.innerHTML=
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">' +

function renderDashboard(){
  var today=getTodayStr();
  var todayMembers=members.filter(function(m){return m.history.indexOf(today)!==-1;});
  var latestDate='',latestName='';
  members.forEach(function(m){
    var v=m.history.filter(isValidDate);
    if(v.length>0){var last=v[v.length-1];if(last>latestDate){latestDate=last;latestName=m.name;}}
  });
  var lowMembers=members.filter(function(m){return (m.totalSessions-m.usedSessions)<=warnLimit&&m.usedSessions>0;});
  var dash=document.getElementById('page-dash');
  dash.innerHTML=
    logoHTML()+
    '<div style="font-family:Kanit;font-weight:900;font-size:20px;color:#f5c518;margin-bottom:16px;text-align:center">📊 Dashboard</div>'+

    '<div class="dash-card">' +
    '<div class="dash-num">'+todayMembers.length+'</div>' +
    '<div class="dash-label">เช็คอินวันนี้ ('+formatDateTH(today)+')</div>' +
    (todayMembers.length>0?
      '<div style="margin-top:12px">'+todayMembers.map(function(m){
        return '<div style="background:#111;border-radius:8px;padding:8px 12px;font-size:14px;margin-bottom:6px;border:1px solid #252525">'+m.name+'</div>';
      }).join('')+'</div>'
      :'<div style="color:#555;font-size:13px;margin-top:8px">ยังไม่มีการเช็คอินวันนี้</div>')+
    '</div>'+

    '<div class="dash-card">' +
    '<div class="dash-label" style="margin-bottom:8px">🏆 เช็คอินล่าสุด</div>' +
    (latestName?
      '<div style="font-family:Kanit;font-weight:700;font-size:18px;color:#f5f5f5">'+latestName+'</div>'+
      '<div style="color:#666;font-size:13px;margin-top:4px">'+formatDateTH(latestDate)+'</div>'
      :'<div style="color:#555;font-size:13px">ไม่มีข้อมูล</div>')+
    '</div>'+

    '<div class="dash-card"><div class="dash-num">'+members.length+'</div><div class="dash-label">สมาชิกทั้งหมด</div></div>'+

    '<div class="dash-card">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
    '<div style="color:#f5c518;font-family:Kanit;font-weight:700;font-size:16px">⚠️ ใกล้หมดครั้ง</div>' +
    '<div style="display:flex;align-items:center;gap:6px">' +
    '<span style="font-size:12px;color:#666">เหลือ ≤</span>' +
    '<input type="number" id="warn-limit" value="'+warnLimit+'" min="1" max="20" style="width:50px;padding:4px 8px;font-size:14px;text-align:center;border-radius:8px" oninput="updateWarnLimit(this.value)" />' +
    '<span style="font-size:12px;color:#666">ครั้ง</span>' +
    '</div></div>'+
    (lowMembers.length===0?'<div style="color:#555;font-size:13px">ไม่มีสมาชิกที่ครั้งเหลือน้อย</div>':
      lowMembers.map(function(m){
        var rem=m.totalSessions-m.usedSessions;
        var lastDate=getLastDate(m);
        return '<div class="warn-item">' +
          '<div><div style="font-size:14px;font-weight:600">'+m.name+'</div>'+
          (lastDate?'<div style="font-size:11px;color:#888;margin-top:2px">📅 '+formatDateTH(lastDate)+'</div>':'')+'</div>'+
          '<span style="color:#ff6060;font-family:Kanit;font-weight:700;font-size:18px">'+rem+' ครั้ง</span></div>';
      }).join(''))+
    '</div>';
}

function updateWarnLimit(val){
  warnLimit=parseInt(val)||3;
  localStorage.setItem('warnLimit',warnLimit);
  renderDashboard();
}

function doCheckin(){
  var m=getSelected();
  var date=document.getElementById('checkin-date').value;
  if(!date) return;
  if(m.history.indexOf(date)!==-1){showToast('วันนี้เช็คอินไปแล้ว!','error');return;}
  if(m.usedSessions>=m.totalSessions){showToast('ครั้งหมดแล้ว!','error');return;}
  members=members.map(function(x){
    if(x.id!==m.id) return x;
    var h=x.history.slice();h.push(date);h.sort();
    return {id:x.id,name:x.name,totalSessions:x.totalSessions,usedSessions:x.usedSessions+1,history:h};
  });
  showToast('เช็คอิน '+m.name+' สำเร็จ! 🎉','ok');
  view='list';render();saveToFirebase();
}

function doUncheckin(memberId,date){
  members=members.map(function(m){
    if(m.id!==memberId) return m;
    return {id:m.id,name:m.name,totalSessions:m.totalSessions,usedSessions:Math.max(0,m.usedSessions-1),history:m.history.filter(function(d){return d!==date;})};
  });
  showToast('ยกเลิกเช็คอินแล้ว','ok');
  selected=members.find(function(m){return m.id===memberId;});
  view='detail';render();saveToFirebase();
}

function doAddMember(){
  var name=document.getElementById('new-name').value.trim();
  var sessions=parseInt(document.getElementById('new-sessions').value)||20;
  if(!name){showToast('กรุณากรอกชื่อ','error');return;}
  var newM={id:Date.now(),name:name,totalSessions:sessions,usedSessions:0,history:[]};
  members=[newM].concat(members);
  showToast('เพิ่มสมาชิก '+name+' แล้ว 🎉','ok');
  view='list';render();saveToFirebase();
}

function doSaveEdit(){
  var total=parseInt(document.getElementById('edit-total').value)||1;
  var used=Math.min(parseInt(document.getElementById('edit-used').value)||0,total);
  members=members.map(function(m){
    if(m.id!==selected.id) return m;
    return {id:m.id,name:m.name,totalSessions:total,usedSessions:used,history:m.history};
  });
  showToast('บันทึกแล้ว ✓','ok');
  view='list';render();saveToFirebase();
}

function doDelete(id){
  if(!confirm('ลบสมาชิกนี้?')) return;
  members=members.filter(function(m){return m.id!==id;});
  showToast('ลบสมาชิกแล้ว','ok');
  view='list';render();saveToFirebase();
}

function saveToFirebase(){
  updateSyncStatus('loading');
  window._fbSave(members).then(function(){updateSyncStatus('ok');}).catch(function(){updateSyncStatus('err');});
}

window._load=function(){
  // Show initial data immediately
  if(members.length===0){
    members=JSON.parse(JSON.stringify(INITIAL_DATA));
    render();
  }
  updateSyncStatus('loading');
  // Then sync Firebase in background
  if(window._fbLoad){
    window._fbLoad().then(function(data){
      if(data&&data.length>0){members=data;}
      else{window._fbSave(members);}
      updateSyncStatus('ok');
      render();
      if(currentTab==='dash') renderDashboard();
    }).catch(function(){
      updateSyncStatus('err');
    });
  }
};

// Show data immediately on load
members=JSON.parse(JSON.stringify(INITIAL_DATA));
render();
updateSyncStatus('loading');
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyAMAR8E16AKsFPKa_akPM28YuzZmBkrZRA",authDomain:"fitness-check-in.firebaseapp.com",projectId:"fitness-check-in",storageBucket:"fitness-check-in.firebasestorage.app",messagingSenderId:"1073147614195",appId:"1:1073147614195:web:c0a5c35f84c0f84833f886"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
window._fbLoad=async function(){
  const snap=await getDoc(doc(db,'fitness','members'));
  if(snap.exists()&&snap.data().list&&snap.data().list.length>0) return snap.data().list;
  return null;
};
window._fbSave=async function(members){
  await setDoc(doc(db,'fitness','members'),{list:members});
};
window._load();
</script>
